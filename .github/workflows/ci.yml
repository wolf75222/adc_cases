name: CI

# adc_cases est 100 % Python : il importe le module `adc` (les bindings de la lib adc_cpp).
# La CI clone adc_cpp (depot public), construit le module, installe le paquet adc_cases en
# editable, puis lance UNIQUEMENT les cas legers du manifeste (cases_manifest.toml, champ
# ci = true). Les cas longs (reproduction figures/gif) et experimentaux (DSL interprete)
# restent HORS CI et se lancent a la main (cf. README). Un cas qui echoue (assert) sort en
# erreur -> CI rouge.

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cases:
    name: ubuntu-latest / cases (legers)
    runs-on: ubuntu-latest

    # adc_cpp est Kokkos-only : le module _adc se construit AVEC Kokkos, et les cas qui compilent un
    # solveur natif / loader DSL au runtime (manifeste needs=["cxx"]) ont besoin d'un Kokkos installe
    # (ADC_KOKKOS_ROOT). On installe donc un Kokkos Serial (mis en cache) partage par les deux.
    env:
      KOKKOS_VERSION: 4.4.01
      KOKKOS_PREFIX: ${{ github.workspace }}/.kokkos-install

    steps:
      - name: Checkout adc_cases
        uses: actions/checkout@v5

      - name: Checkout adc_cpp (la lib)
        uses: actions/checkout@v5
        with:
          repository: wolf75222/adc_cpp
          path: adc_cpp

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      # Kokkos Serial (PIC) installe + mis en cache : sert au build de _adc ET aux cas needs=["cxx"]
      # (loaders DSL / solveur natif compiles au runtime contre ADC_KOKKOS_ROOT).
      - name: Cache Kokkos install (Serial ${{ env.KOKKOS_VERSION }})
        id: kokkos-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.KOKKOS_PREFIX }}
          key: kokkos-${{ runner.os }}-${{ env.KOKKOS_VERSION }}-serial-cxx20-gcc-pic

      - name: Build + install Kokkos (Serial, PIC)
        if: steps.kokkos-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 -b ${KOKKOS_VERSION} https://github.com/kokkos/kokkos.git /tmp/kokkos
          cmake -S /tmp/kokkos -B /tmp/kbuild -G Ninja -DKokkos_ENABLE_SERIAL=ON \
            -DCMAKE_INSTALL_PREFIX="${KOKKOS_PREFIX}" -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=20 -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          cmake --build /tmp/kbuild --parallel 2 --target install

      - name: Build the adc Python module (Kokkos Serial)
        # adc_cpp est Kokkos-only : on construit _adc AVEC Kokkos (-DADC_USE_KOKKOS=ON), en pointant
        # le Kokkos installe ci-dessus (memes en-tetes/ABI que les loaders DSL des cas needs=["cxx"]).
        #
        # OOM/timeout (ADC-75) : `python/system.cpp` sous Kokkos en -O3 fait exploser la RAM de cc1plus
        # (>1-2 GB RSS), ce qui tue le runner (le cap -O0 d'adc_cpp ne couvre que les cibles de TESTS,
        # pas _adc). On borne donc l'optimisation Release a -O1 (RAM cc1plus bien moindre, _adc reste
        # assez rapide pour les cas legers) et on serialise la compilation (-j 1) pour ne charger qu'une
        # TU lourde a la fois. Cap propre cote adc_cpp (par-fichier sur system.cpp) = chantier separe.
        run: |
          cmake -B adc_cpp/build-py -S adc_cpp -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_FLAGS_RELEASE="-O1 -DNDEBUG" \
                -DADC_BUILD_PYTHON=ON -DADC_USE_EIGEN=OFF \
                -DADC_USE_KOKKOS=ON -DKokkos_ROOT="${KOKKOS_PREFIX}"
          cmake --build adc_cpp/build-py --target _adc -j 1

      - name: Install adc_cases + deps
        # Le paquet adc_cases est installe en editable : les cas font `import adc_cases`
        # sans manipuler sys.path. numpy est tire par la dependance du paquet.
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      # Garde-fous (rapide, pur Python, AVANT de lancer les cas) : chaque dossier avec run.py a un
      # README, chaque path du manifeste existe, aucun em-dash dans les README, images existantes.
      - name: Check cases (README + manifeste + em-dash)
        run: python check_cases.py

      - name: Run light cases (manifest ci = true)
        # On lit le manifeste et on lance les cas legers UNIQUEMENT. Le module `adc` (binding
        # C++) est fourni par le PYTHONPATH du build adc_cpp. Les cas needs=["cxx"] compilent un
        # loader DSL / solveur natif au runtime : ils lisent Kokkos via Kokkos_ROOT / ADC_KOKKOS_ROOT
        # (meme install que _adc -> ABI coherente).
        env:
          PYTHONPATH: ${{ github.workspace }}/adc_cpp/build-py/python
          Kokkos_ROOT: ${{ github.workspace }}/.kokkos-install
          ADC_KOKKOS_ROOT: ${{ github.workspace }}/.kokkos-install
        run: |
          set -e
          python - <<'PY' > ci_cases.txt
          import tomllib
          with open("cases_manifest.toml", "rb") as f:
              man = tomllib.load(f)
          for c in man["case"]:
              if c.get("ci"):
                  print(c["path"])
          PY
          while read -r c; do
            [ -z "$c" ] && continue
            echo "::group::$c"
            python3 "$c"
            echo "::endgroup::"
          done < ci_cases.txt
